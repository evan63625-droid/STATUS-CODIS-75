<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Vehicule - SDIS LUTECE BSPP</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#101214;color:white}
header{background:#a90000;min-height:54px;padding:12px;text-align:center;font-weight:bold;font-size:18px;border-bottom:3px solid #e32b2b}
.container{padding:12px;max-width:700px;margin:auto;display:none}
.box{background:#1b1f23;border:1px solid #313840;padding:14px;margin-bottom:12px;border-radius:8px}
.box h3{margin-top:0;color:#ffd6d6}
input,select{width:100%;margin:6px 0;padding:10px;box-sizing:border-box;background:#111417;color:white;border:1px solid #49515a;border-radius:6px;font-size:14px}
button{width:100%;padding:11px;margin-top:7px;border:0;border-radius:6px;background:#c91515;color:white;font-weight:bold;cursor:pointer;font-size:14px}
button:hover{background:#e22424}
button.active{outline:3px solid #fff;opacity:.85}
button.btn-secondary{background:#2a2f35}
button.btn-secondary:hover{background:#3a3f45}
#login{position:fixed;inset:0;background:#0b0d0f;display:flex;justify-content:center;align-items:center;z-index:999;padding:20px}
.login-card{width:100%;max-width:390px;background:#1c2024;border:1px solid #343a40;border-radius:8px;padding:20px}
.login-card h2{margin-top:0;text-align:center}
.status-box{font-size:28px;font-weight:bold;text-align:center;padding:18px;border-radius:8px;background:#111417;border:1px solid #303740;margin-bottom:10px;letter-spacing:.5px}
.radio{background:#111417;border:1px solid #303740;border-left:4px solid #ff5252;border-radius:8px;padding:14px;line-height:1.8;font-size:14px}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.status-1{color:#00c853} .status-2{color:#42a5f5} .status-3{color:#ffeb3b}
.status-4{color:#ff1744} .status-5{color:#ce93d8} .status-6{color:#ff9800}
.status-7{color:#69f0ae} .status-8{color:#999} .status-9{color:#f5f5f5} .status-10{color:#ff5252}
.small{color:#aeb7c2;font-size:13px}
.alerte-banner{background:#5a0000;border:2px solid #ff5252;border-radius:8px;padding:14px;margin-bottom:12px;text-align:center;font-size:16px;font-weight:bold;color:#ff5252;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.inter-detail{margin:4px 0}
.inter-label{color:#aeb7c2;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.inter-value{font-weight:bold}
@media(max-width:600px){.status-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <h2>Radio vehicule</h2>
    <input id="matricule" placeholder="Matricule">
    <input id="password" type="password" placeholder="Mot de passe">
    <select id="vehSelect"><option value="">Choisir le vehicule</option></select>
    <button onclick="enter()">Connexion radio</button>
    <p class="small" style="text-align:center">Le statut envoye ici remonte dans la main courante CODIS.</p>
  </div>
</div>

<header>SDIS LUTECE BSPP — RADIO VEHICULE</header>

<div class="container" id="mainContainer">
  <div id="alerteBanner" class="alerte-banner" style="display:none">
    ALERTE — Depart en cours !
  </div>

  <div class="box">
    <h3 id="vehTitle">Vehicule</h3>
    <div id="statusDisplay" class="status-box">Chargement...</div>
    <div class="small" id="lastUpdate" style="text-align:center;margin-top:6px">En attente de synchronisation.</div>
  </div>

  <div class="box" id="radioBox">
    <h3>Feuille d'intervention</h3>
    <div id="radio" class="radio">Aucune intervention en cours.</div>
  </div>

  <div class="box">
    <h3>Changer le statut</h3>
    <div id="statusBtns" class="status-grid"></div>
    <button class="btn-secondary" onclick="deconnexion()" style="margin-top:14px">Se deconnecter</button>
  </div>
</div>

<script>
/* ======= FIREBASE ======= */
var firebaseConfig = {
  apiKey: "AIzaSyBB8KP4Btsjvv1Dktsmt1qf1eujiuGKAWg",
  authDomain: "codis-lutece.firebaseapp.com",
  databaseURL: "https://codis-lutece-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "codis-lutece",
  storageBucket: "codis-lutece.firebasestorage.app",
  messagingSenderId: "762134476859",
  appId: "1:762134476859:web:afcf9a2ae4073a6966c41e"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

/* ======= CONFIG ======= */
var passwords = {"SP-95":"BSPP95","SP-09":"CTA09","BSPPlutece":"Codis75*"};

var statusLabels = {
  1:"Depart",2:"Sur les lieux",3:"Message",4:"Message Urgent",
  5:"Transit hopital",6:"Arrive hopital",7:"Disponible",
  8:"Indispo",9:"Rentre",10:"Alerte"
};
var statusColors = {
  1:"#00c853",2:"#42a5f5",3:"#ffeb3b",4:"#ff1744",5:"#ce93d8",
  6:"#ff9800",7:"#69f0ae",8:"#999",9:"#f5f5f5",10:"#ff5252"
};

/* ======= ETAT ======= */
var vehicules = [];
var selectedVehName = "";
var selectedVehIdx = -1;
var user = null;

/* ======= HELPERS ======= */
function escapeHtml(v){
  return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function formatTime(ts){
  return new Date(ts||Date.now()).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

/* ======= FIREBASE LISTENER vehicules ======= */
db.ref("vehicules").on("value",function(snap){
  var val = snap.val();
  vehicules = Array.isArray(val) ? val : (val ? Object.values(val) : []);
  fillVehicleSelect();
  if(selectedVehName){
    selectedVehIdx = vehicules.findIndex(function(v){return v.name===selectedVehName;});
    renderRadio();
    renderStatusButtons();
  }
});

/* ======= LOGIN ======= */
function fillVehicleSelect(){
  var sel = document.getElementById("vehSelect");
  var current = sel.value;
  sel.innerHTML = '<option value="">Choisir le vehicule</option>';
  vehicules.forEach(function(v){
    var opt = document.createElement("option");
    opt.value = v.name; opt.textContent = v.name;
    if(v.name === current){opt.selected = true;}
    sel.appendChild(opt);
  });
}

function enter(){
  var mat  = document.getElementById("matricule").value.trim();
  var pass = document.getElementById("password").value;
  var veh  = document.getElementById("vehSelect").value;
  if(!passwords[mat] || passwords[mat] !== pass){alert("Acces refuse.");return;}
  if(!veh){alert("Choisis ton vehicule.");return;}
  selectedVehName = veh;
  selectedVehIdx  = vehicules.findIndex(function(v){return v.name===veh;});
  user = {mat:mat};
  if(selectedVehIdx === -1){alert("Vehicule introuvable dans Firebase.");return;}
  document.getElementById("login").style.display = "none";
  document.getElementById("mainContainer").style.display = "block";
  db.ref("journal").push({text:selectedVehName+" connecte a la radio vehicule",time:Date.now(),user:selectedVehName});
  renderRadio();
  renderStatusButtons();
}

function deconnexion(){
  selectedVehName = "";
  selectedVehIdx  = -1;
  user = null;
  document.getElementById("login").style.display = "flex";
  document.getElementById("mainContainer").style.display = "none";
  document.getElementById("matricule").value = "";
  document.getElementById("password").value = "";
}

/* ======= RENDER ======= */
function renderRadio(){
  if(selectedVehIdx === -1 || !vehicules[selectedVehIdx]){return;}
  var v = vehicules[selectedVehIdx];
  var status = v.status || 9;
  var col = statusColors[status] || "#fff";

  document.getElementById("vehTitle").textContent = v.name;
  var disp = document.getElementById("statusDisplay");
  disp.className = "status-box";
  disp.style.color = col;
  disp.style.borderColor = col;
  disp.textContent = statusLabels[status] || "Inconnu";
  document.getElementById("lastUpdate").textContent = "Mis a jour : " + formatTime(Date.now());

  // Banniere alerte
  document.getElementById("alerteBanner").style.display = (status===10 ? "block" : "none");

  // Fiche intervention
  var radio = document.getElementById("radio");
  if(v.intervention && status!==7 && status!==8 && status!==9){
    var inter = v.intervention;
    radio.innerHTML =
      "<div class='inter-detail'><span class='inter-label'>Numero</span><br><span class='inter-value'>"+escapeHtml(inter.id)+"</span></div>"
      +"<div class='inter-detail'><span class='inter-label'>Type</span><br><span class='inter-value'>"+escapeHtml(inter.type)+"</span></div>"
      +"<div class='inter-detail'><span class='inter-label'>Precision</span><br><span class='inter-value'>"+escapeHtml(inter.precision)+"</span></div>"
      +"<div class='inter-detail'><span class='inter-label'>Adresse</span><br><span class='inter-value'>"+escapeHtml(inter.adresse)+"</span></div>"
      +(inter.obs?"<div class='inter-detail'><span class='inter-label'>Observations</span><br><span class='inter-value'>"+escapeHtml(inter.obs)+"</span></div>":"")
      +"<div class='inter-detail'><span class='inter-label'>Vehicules engages</span><br><span class='inter-value'>"+escapeHtml(inter.vehicules)+"</span></div>";
  }else{
    radio.innerHTML = "Aucune intervention en cours.";
  }
}

function renderStatusButtons(){
  var box = document.getElementById("statusBtns");
  box.innerHTML = "";
  if(selectedVehIdx===-1||!vehicules[selectedVehIdx]){return;}
  var currentStatus = vehicules[selectedVehIdx].status||9;
  for(var i=1;i<=9;i++){
    (function(s){
      var btn = document.createElement("button");
      btn.textContent = s+" — "+statusLabels[s];
      btn.style.background = (currentStatus===s) ? statusColors[s] : "";
      btn.style.color = (currentStatus===s) ? "#000" : "#fff";
      btn.onclick = function(){setStatus(s);};
      box.appendChild(btn);
    })(i);
  }
}

function setStatus(status){
  if(selectedVehIdx===-1){return;}
  var v = vehicules[selectedVehIdx];
  v.status = status;
  if(status===7||status===8||status===9){delete v.intervention;}
  db.ref("vehicules/"+selectedVehIdx).set(v);
  db.ref("journal").push({
    text:v.name+" → "+statusLabels[status]+" (radio vehicule)",
    time:Date.now(),
    user:user?user.mat:v.name
  });
  renderRadio();
  renderStatusButtons();
}
</script>
</body>
</html>
